<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ma Tournée">
<meta name="theme-color" content="#0a84ff">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>Ma Tournée</title>
<style>
:root{
  --bg:#f2f2f7;--card:#fff;--txt:#1c1c1e;--sub:#6e6e73;--line:#e5e5ea;
  --blue:#0a84ff;--red:#ff3b30;--orange:#ff9500;--green:#34c759;--purple:#af52de;--street:#3a3a8c;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#000;--card:#1c1c1e;--txt:#f2f2f7;--sub:#98989e;--line:#2c2c2e;--street:#5555b8}
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{height:100%;margin:0;overflow:hidden;overscroll-behavior:none}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro",Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt);
display:flex;flex-direction:column;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}

header{flex:0 0 auto;display:flex;align-items:center;gap:5px;padding:8px 8px 4px}
.hBtn{border:1px solid var(--line);background:var(--card);color:var(--txt);border-radius:10px;padding:8px 9px;font-size:16px;font-weight:700}
.hBtn.on{background:var(--orange);border-color:var(--orange);color:#fff}
/* confidentialité : noms floutés, maintenir le doigt pour révéler */
body.priv .nm,body.priv .cNm,body.priv #adrNm{filter:blur(5px)}
body.priv .peek{filter:none!important}
#modeChip{border:none;border-radius:10px;padding:8px 8px;font-size:12.5px;font-weight:800;color:#fff;background:var(--blue);white-space:nowrap}
#hTitle{flex:1;min-width:0;text-align:right}
#hCount{font-size:12.5px;color:var(--sub);font-weight:600;white-space:nowrap}
#pbar{flex:0 0 auto;height:5px;background:var(--line);margin:4px 12px;border-radius:3px;overflow:hidden}
#pbar>div{height:100%;background:var(--green);width:0%;transition:width .25s}

#pre{flex:0 0 auto;margin:6px 12px 0;padding:9px 12px;border-radius:12px;background:var(--card);border:1px solid var(--line);
font-size:13.5px;font-weight:600;line-height:1.35;min-height:20px;max-height:88px;overflow:hidden}
#pre.exp{max-height:45vh;overflow-y:auto}
#pre .lab{color:var(--blue);font-weight:800}
#pre .trav{color:var(--purple);font-weight:700}
#pre.hidden{visibility:hidden}

#card{flex:1 1 auto;min-height:0;margin:8px 12px;border-radius:20px;background:var(--card);border:1px solid var(--line);
display:flex;flex-direction:column;overflow:hidden}
#streetHead{flex:0 0 auto;padding:12px 14px;background:var(--street);color:#fff;border-radius:19px 19px 0 0}
#streetName{font-size:20px;font-weight:900;line-height:1.15}
#streetCom{font-size:12px;font-weight:700;opacity:.85;letter-spacing:1px}
#list{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 10px 10px}
.row{display:flex;align-items:center;gap:10px;padding:8px 6px;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row.done{opacity:.4}
.row.done .nm{text-decoration:line-through}
.row.rel{background:#af52de18;border-radius:10px}
.bdg{flex:0 0 auto;min-width:58px;text-align:center;padding:7px 6px;border-radius:10px;font-weight:900;font-size:19px;color:#fff;background:var(--blue);line-height:1}
.bdg.G{background:var(--green)}
.bdg.X{background:var(--sub)}
.bdg small{display:block;font-size:8.5px;font-weight:700;opacity:.9;margin-top:2px}
.mid{flex:1;min-width:0}
.nm{font-size:15px;font-weight:600;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.why{font-size:11.5px;color:var(--sub);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.why b{color:var(--orange)}
.why .rl{color:var(--purple);font-weight:800}
.ic{flex:0 0 auto;font-size:19px;display:flex;gap:3px}
.instrRow{padding:7px 8px;font-size:13.5px;font-style:italic;font-weight:600;color:var(--orange)}
.instrRow.dgr{color:var(--red)}
.emptyMsg{text-align:center;color:var(--sub);padding:34px 16px;font-size:16px;font-weight:600}

#post{flex:0 0 auto;margin:0 12px;padding:10px 12px;border-radius:12px;font-size:14px;font-weight:700;line-height:1.3;
background:#ff950022;border:1.5px solid var(--orange);max-height:80px;overflow:hidden}
#post.exp{max-height:40vh;overflow-y:auto}
#post.danger{background:#ff3b3022;border-color:var(--red)}
#post.calm{background:var(--card);border:1px solid var(--line);font-weight:500;color:var(--sub)}
#post .lab{font-weight:900;color:var(--orange)}
#post.danger .lab{color:var(--red)}
#post .trav{color:var(--purple)}

#valid{flex:0 0 auto;margin:8px 12px 10px;padding:17px;border:none;border-radius:18px;background:var(--green);
color:#fff;font-size:19px;font-weight:900;letter-spacing:.5px;box-shadow:0 3px 10px rgba(52,199,89,.35)}
#valid:active{transform:scale(.97)}

.ovl{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;padding:calc(env(safe-area-inset-top) + 14px) 14px calc(env(safe-area-inset-bottom) + 12px);z-index:30}
.ovl h2{font-size:19px;margin:2px 0 10px;flex:0 0 auto}
.ovlScroll{flex:1 1 auto;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mBtn{display:flex;justify-content:space-between;align-items:center;gap:8px;width:100%;padding:15px;margin-bottom:10px;
border:1px solid var(--line);border-radius:14px;background:var(--card);color:var(--txt);font-size:16px;font-weight:700;text-align:left}
.mBtn small{color:var(--sub);font-weight:500;flex:0 0 auto}
.mBtn.cur{border-color:var(--blue);border-width:2.5px}
.mBtn .dot{flex:0 0 auto;width:14px;height:14px;border-radius:50%}
.mBtn span{flex:1}
.sec{color:var(--sub);font-size:12px;font-weight:800;letter-spacing:1px;margin:10px 2px 6px}
.closeBtn{flex:0 0 auto;margin-top:10px;padding:15px;border:none;border-radius:14px;background:var(--blue);color:#fff;font-size:16px;font-weight:800;width:100%}
.danger{color:var(--red)}
.note{font-size:12px;color:var(--sub);margin:6px 2px}

/* checklist dépôts */
.comChips{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;flex:0 0 auto}
.comChips::-webkit-scrollbar{display:none}
.comChip{flex:0 0 auto;padding:9px 13px;border-radius:16px;background:var(--card);border:1px solid var(--line);font-size:14px;font-weight:700;color:var(--txt)}
.comChip.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.stHead{position:sticky;top:0;z-index:2;padding:6px 10px;background:var(--street);color:#fff;border-radius:8px;font-weight:800;font-size:13px;margin:10px 0 4px}
.cRow{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--line)}
.cRow .cBdg{flex:0 0 auto;min-width:44px;text-align:center;padding:5px 4px;border-radius:8px;font-weight:800;font-size:14px;color:#fff;background:var(--blue)}
.cRow .cBdg.G{background:var(--green)}
.cRow .cBdg.X{background:var(--sub)}
.cRow .cInfo{flex:1;min-width:0}
.cRow .cNm{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cRow .cWhere{font-size:11px;color:var(--sub)}
.tgl{flex:0 0 auto;font-size:20px;padding:7px 10px;border-radius:10px;border:1.5px solid var(--line);background:var(--card);opacity:.3}
.tgl.on{opacity:1;border-color:var(--orange);background:#ff950022}
#dSearch{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--txt);font-size:16px;outline:none;margin-bottom:8px;flex:0 0 auto}
#dSummary{flex:0 0 auto;font-size:13px;font-weight:700;color:var(--orange);margin-bottom:6px}

/* recherche adresse */
.selRow{display:flex;flex-direction:column;gap:10px;flex:0 0 auto}
.selRow select{width:100%;padding:13px 12px;border-radius:12px;border:1px solid var(--line);background:var(--card);color:var(--txt);font-size:16px;font-weight:600;-webkit-appearance:none;appearance:none}
#adrCard{margin-top:12px;padding:14px;border-radius:14px;background:var(--card);border:1px solid var(--line)}
#adrCard.hidden{display:none}
#adrNm{font-size:16px;font-weight:700;line-height:1.3}
#adrDet{font-size:13px;color:var(--sub);margin-top:4px}
#adrTags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.tag{font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:8px;color:#fff}
.t-SP{background:var(--orange)}.t-DEP{background:var(--purple)}.t-CHIEN{background:var(--red)}.t-RS{background:var(--sub)}
.t-BAL{background:transparent;color:var(--sub);border:1px solid var(--line)}
#adrBtns{display:flex;gap:8px;margin-top:12px}
#adrBtns .tgl{font-size:22px;padding:10px 14px}
#adrGo{flex:1;padding:12px;border:none;border-radius:12px;background:var(--green);color:#fff;font-size:15px;font-weight:800}

#doneScreen{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:30px;text-align:center;z-index:20}
#doneScreen h2{font-size:26px;margin:0}
#doneScreen button{padding:16px;border:none;border-radius:16px;font-size:17px;font-weight:800;background:var(--blue);color:#fff;width:100%;max-width:340px}
#doneScreen button.b2{background:var(--card);color:var(--txt);border:1px solid var(--line)}
</style>
</head>
<body>
<header>
  <button class="hBtn" id="menuBtn">☰</button>
  <button id="modeChip"></button>
  <div id="hTitle"><div id="hCount"></div></div>
  <button class="hBtn" id="privBtn" title="Flouter les noms">🕶</button>
  <button class="hBtn" id="adrBtn">🔍</button>
  <button class="hBtn" id="backBtn">↩</button>
</header>
<div id="pbar"><div></div></div>
<div id="pre"></div>
<div id="card">
  <div id="streetHead"><div id="streetCom"></div><div id="streetName"></div></div>
  <div id="list"></div>
</div>
<div id="post"></div>
<button id="valid">✓ RUE FAITE — SUIVANTE</button>

<div id="doneScreen">
  <h2>🎉 Journée terminée !</h2>
  <div id="doneSub" style="color:var(--sub)"></div>
  <button id="redoDay">↺ Recommencer la journée</button>
  <button class="b2" id="doneMenu">☰ Menu</button>
</div>

<div class="ovl" id="menu">
  <h2>📮 Ma tournée</h2>
  <div class="ovlScroll">
    <div class="sec">TYPE DE JOURNÉE</div>
    <div id="modeList"></div>
    <div class="sec">DÉPÔTS DU JOUR</div>
    <button class="mBtn" id="colisBtn"><span>📦 Colis &amp; ✉️ Prioritaires</span><small id="colisCount"></small></button>
    <div class="sec">OUTILS</div>
    <button class="mBtn" id="adrBtn2"><span>🔍 Recherche par adresse</span></button>
    <div class="sec">ALLER À</div>
    <div id="jumpList"></div>
    <button class="mBtn danger" id="resetDay"><span>↺ Recommencer la journée</span></button>
    <div class="note" id="wakeNote"></div>
  </div>
  <button class="closeBtn" id="closeMenu">Fermer</button>
</div>

<div class="ovl" id="colisPanel">
  <h2>📦 Colis &amp; ✉️ Prioritaires</h2>
  <div id="dSummary"></div>
  <div class="comChips" id="dChips"></div>
  <input id="dSearch" type="search" placeholder="🔍 Filtrer (nom, rue, n°)… facultatif">
  <div class="ovlScroll" id="dList"></div>
  <button class="mBtn danger" id="clearColis" style="flex:0 0 auto;margin-top:8px"><span>🗑 Tout effacer (fin de journée)</span></button>
  <button class="closeBtn" id="closeColis">Fermer</button>
</div>

<div class="ovl" id="adrPanel">
  <h2>🔍 Recherche par adresse</h2>
  <div class="ovlScroll">
    <div class="selRow">
      <select id="selCom"></select>
      <select id="selRue"></select>
      <select id="selNum"></select>
    </div>
    <div id="adrCard" class="hidden">
      <div id="adrNm"></div>
      <div id="adrDet"></div>
      <div id="adrTags"></div>
      <div id="adrBtns">
        <button class="tgl" id="adrColis">📦</button>
        <button class="tgl" id="adrPrio">✉️</button>
        <button id="adrGo">➡ Aller à cette rue</button>
      </div>
    </div>
  </div>
  <button class="closeBtn" id="closeAdr">Fermer</button>
</div>


<div id="lockOvl" style="position:fixed;inset:0;z-index:99;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:30px;text-align:center">
  <div style="font-size:54px">📮🔐</div>
  <div style="font-size:19px;font-weight:800">Ma Tournée</div>
  <div style="font-size:13px;color:var(--sub);max-width:280px">Les données sont chiffrées. Entre le mot de passe (une seule fois sur ce téléphone).</div>
  <input id="pwIn" type="password" placeholder="Mot de passe" autocomplete="current-password" style="width:100%;max-width:280px;padding:14px;border-radius:14px;border:1px solid var(--line);background:var(--card);color:var(--txt);font-size:17px;text-align:center;outline:none">
  <button id="pwBtn" style="width:100%;max-width:280px;padding:15px;border:none;border-radius:14px;background:var(--blue);color:#fff;font-size:17px;font-weight:800">Déverrouiller</button>
  <div id="pwErr" style="color:var(--red);font-weight:700;font-size:14px;min-height:20px"></div>
</div>

const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function tryPw(pw){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const k=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(ENC.s),iterations:150000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(ENC.i)},k,b64(ENC.c));
  window.__D=JSON.parse(new TextDecoder().decode(pt));
  try{localStorage.setItem("pwCache",pw)}catch(e){}
  document.getElementById("lockOvl").style.display="none";
  const sc=document.createElement("script");sc.src="app.js";document.body.appendChild(sc);
}
function attempt(){
  const pw=document.getElementById("pwIn").value.trim();
  document.getElementById("pwErr").textContent="";
  tryPw(pw).catch(()=>{document.getElementById("pwErr").textContent="❌ Mot de passe incorrect"});
}
document.getElementById("pwBtn").onclick=attempt;
document.getElementById("pwIn").addEventListener("keydown",e=>{if(e.key==="Enter")attempt()});
if(!crypto.subtle){document.getElementById("pwErr").textContent="⚠ Ouvrir via https (page hébergée)"}
else{const c=localStorage.getItem("pwCache");if(c)tryPw(c).catch(()=>{})}
</script>
